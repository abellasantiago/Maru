<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Santi &amp; Maru — Nuestro recorrido</title>
  <meta name="description" content="Un regalo: nuestra historia, contada en un viaje.">
  <!-- Favicon inline: corazón en la paleta del sitio -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Cpath fill='%23c8283f' d='M12 21c-.6 0-6.8-4.6-9.2-8.4C.6 9 2 5 5.6 4.2 8 3.7 10.6 5 12 7c1.4-2 4-3.3 6.4-2.8C22 5 23.4 9 21.2 12.6 18.8 16.4 12.6 21 12 21z'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="css/estilos.css">

  <!-- Librerías vendorizadas (sin CDN, funciona offline para siempre) -->
  <script src="js/vendor/gsap.min.js"></script>
  <script src="js/vendor/ScrollTrigger.min.js"></script>
  <script src="js/vendor/lenis.min.js"></script>

  <!-- Mapa de imports para resolver "three" y sus addons desde /js/vendor/ -->
  <script type="importmap">
  {
    "imports": {
      "three": "./js/vendor/three/three.module.min.js",
      "three/addons/": "./js/vendor/three/addons/"
    }
  }
  </script>
</head>
<body>

  <!-- ═══════════════ CAPAS FIJAS DE LA ESCENA 3D ═══════════════ -->
  <!-- Un único canvas WebGL persistente para todo el hero -->
  <canvas id="lienzo-webgl" aria-hidden="true"></canvas>
  <!-- Capa CSS3D: paneles de vidrio reales (DOM) posicionados en el espacio 3D -->
  <div id="capa-css3d" aria-hidden="true"></div>
  <!-- Grano de película sutil sobre toda la composición (unifica WebGL + DOM) -->
  <div id="grano-global" aria-hidden="true"></div>
  <!-- Velo de transición hero → timeline (dissolve a crema) -->
  <div id="velo-transicion" aria-hidden="true"></div>

  <!-- ═══════════════ INTERFAZ DEL HERO ═══════════════ -->

  <!-- Monograma (arriba a la izquierda) -->
  <header class="ui monograma" id="monograma">
    <span class="monograma-sub">nuestro recorrido</span>
  </header>

  <!-- Nav superior derecha: cápsula con latido de corazón entre los nombres -->
  <nav class="ui nav-pill" id="nav-pill" aria-label="Nosotros">
    <span class="nav-nombre">Santi</span>
    <!-- Latido cardíaco animado (reemplaza la línea/onda del sitio de referencia) -->
    <svg class="nav-latido" viewBox="0 0 64 24" aria-hidden="true">
      <path class="latido-base"  d="M2 12 H18 L23 12 L27 4 L32 20 L36 8 L39 12 H62" fill="none"/>
      <path class="latido-pulso" d="M2 12 H18 L23 12 L27 4 L32 20 L36 8 L39 12 H62" fill="none"/>
    </svg>
    <span class="nav-nombre">Maru</span>
  </nav>

  <!-- Sidebar izquierda: navegación por momentos (se genera desde js/hero/momentos.js) -->
  <aside class="ui sidebar-momentos" id="sidebar-momentos" aria-label="Momentos"></aside>

  <!-- Buscador inferior izquierda: salta a un momento por palabra o fecha -->
  <form class="ui buscador" id="buscador" autocomplete="off">
    <svg class="buscador-icono" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 19c-.5 0-5.4-3.7-7.3-6.7C2.9 9.5 4 6.4 6.9 5.8 8.8 5.4 10.9 6.4 12 8c1.1-1.6 3.2-2.6 5.1-2.2 2.9.6 4 3.7 2.2 6.5C17.4 15.3 12.5 19 12 19z" fill="none" stroke="currentColor" stroke-width="1.4"/>
    </svg>
    <input id="buscador-input" type="text" placeholder="buscá un momento" aria-label="Buscar un momento">
  </form>

  <!-- Indicador inferior derecha: panel activo + navegación manual -->
  <div class="ui indicador" id="indicador">
    <button type="button" class="indicador-flecha" id="indicador-prev" aria-label="Momento anterior">&#8249;&#8249;</button>
    <div class="indicador-centro">
      <span class="indicador-contador"><span id="indicador-actual">01</span>&thinsp;/&thinsp;<span id="indicador-total">05</span></span>
      <span class="indicador-titulo" id="indicador-titulo">El comienzo</span>
    </div>
    <button type="button" class="indicador-flecha" id="indicador-next" aria-label="Momento siguiente">&#8250;&#8250;</button>
  </div>

  <!-- Pista de scroll (desaparece al primer desplazamiento) -->
  <div class="ui pista-scroll" id="pista-scroll" aria-hidden="true">
    <span>deslizá para viajar</span>
    <svg viewBox="0 0 16 24"><path d="M3 8 L8 14 L13 8" fill="none" stroke="currentColor" stroke-width="1.5"/></svg>
  </div>

  <!-- Cursor personalizado: cerezas dobles (logo de Pachá) que cuelgan desde la punta del cursor -->
  <div id="cursor-cereza" aria-hidden="true">
    <svg viewBox="0 0 40 50">
      <!-- Todo cuelga desde el punto (3,3): ese punto es la punta real del cursor.
           El tallo se bifurca hacia las dos cerezas; el grupo se mece suavemente
           (animación en CSS) para dar sensación de colgar de verdad. -->
      <g class="cereza-colgante">
        <path class="cereza-tallo" d="M3 3 C 7 14, 13 20, 15 31 M3 3 C 11 8, 22 16, 27 29" fill="none"/>
        <path class="cereza-hoja" d="M4 4 C 12 1, 18 4, 16 10 C 10 10, 5 8, 4 4 Z"/>
        <circle class="cereza-fruta" cx="15" cy="38.5" r="7.5"/>
        <circle class="cereza-fruta" cx="27" cy="36.5" r="7.5"/>
        <circle class="cereza-brillo" cx="12" cy="35.5" r="1.9"/>
        <circle class="cereza-brillo" cx="24" cy="33.5" r="1.9"/>
      </g>
    </svg>
  </div>

  <!-- ═══════════════ RECORRIDO (espaciador de scroll del hero) ═══════════════ -->
  <!-- No tiene contenido visible: su altura define la duración del viaje de cámara -->
  <div id="recorrido" aria-hidden="true"></div>

  <!-- ═══════════════ PANTALLA FINAL (cierre) ═══════════════ -->
  <!--
    Al terminar el timeline, el velo crema disuelve hacia esta pantalla.
    El hero pausa su renderizado al entrar acá (pero el cursor sigue vivo).
  -->
  <main class="seccion-final" id="final">
    <div class="final-interior">
      <p class="final-cabecera">y recién empieza</p>
      <h1 class="final-titulo">Que sea eterno.</h1>
      <span class="final-corazon" aria-hidden="true">
        <svg viewBox="0 0 24 24"><path d="M12 21c-.6 0-6.8-4.6-9.2-8.4C.6 9 2 5 5.6 4.2 8 3.7 10.6 5 12 7c1.4-2 4-3.3 6.4-2.8C22 5 23.4 9 21.2 12.6 18.8 16.4 12.6 21 12 21z"/></svg>
      </span>
    </div>
  </main>

  <!-- Punto de entrada del hero (módulos ES) -->
  <script type="module" src="js/hero/main.js"></script>
</body>
</html>
